server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: booking-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/bookings/**, /api/resources/**
        - id: billing-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/billing/**
        - id: ai-concierge
          uri: http://localhost:8083
          predicates:
            - Path=/api/chat/**
        - id: auth-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/auth/**
